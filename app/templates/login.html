<!doctype html>
<html lang="en" data-bs-theme="blue-theme">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Etsy Agent Manager</title>
  <!--favicon-->
  <link rel="icon" href="/static/assets/images/favicon-32x32.png" type="image/png">
  <!--loader-->
  <link href="/static/assets/css/pace.min.css" rel="stylesheet">
  <script src="/static/assets/js/pace.min.js"></script>

  <!--plugins-->
  <link href="/static/assets/plugins/perfect-scrollbar/css/perfect-scrollbar.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="/static/assets/plugins/metismenu/metisMenu.min.css">
  <link rel="stylesheet" type="text/css" href="/static/assets/plugins/metismenu/mm-vertical.css">
  <!--bootstrap css-->
  <link href="/static/assets/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet">
  <!--main css-->
  <link href="/static/assets/css/bootstrap-extended.css" rel="stylesheet">
  <link href="/static/assets/sass/main.css" rel="stylesheet">
  <link href="/static/assets/sass/dark-theme.css" rel="stylesheet">
  <link href="/static/assets/sass/blue-theme.css" rel="stylesheet">
  <link href="/static/assets/sass/responsive.css" rel="stylesheet">
</head>

<body>

  <!--authentication-->
  <div class="section-authentication-cover">
    <div class="">
      <div class="row g-0">

        <div class="col-12 col-xl-7 col-xxl-8 auth-cover-left align-items-center justify-content-center d-none d-xl-flex border-end bg-transparent">
          <div class="card rounded-0 mb-0 border-0 shadow-none bg-transparent bg-none">
            <div class="card-body">
              <div class="text-center">
                <i class="material-icons-outlined" style="font-size:200px;color:var(--bs-primary);opacity:0.15;">mosque</i>
                <h2 class="mt-4">Etsy Agent Manager</h2>
                <p class="lead text-secondary">AI-powered Islamic digital products automation</p>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-xl-5 col-xxl-4 auth-cover-right align-items-center justify-content-center border-top border-4 border-primary border-gradient-1">
          <div class="card rounded-0 m-3 mb-0 border-0 shadow-none bg-none">
            <div class="card-body p-sm-5">
              <h4 class="fw-bold">Welcome Back</h4>
              <p class="mb-0">Enter your credentials to login your account</p>

              {% if error %}
              <div class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
                {{ error }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
              {% endif %}

              <div class="form-body mt-4">
                <form method="post" action="/login" class="row g-3">
                  <div class="col-12">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required autofocus>
                  </div>
                  <div class="col-12">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group" id="show_hide_password">
                      <input type="password" class="form-control" id="password" name="password" placeholder="Enter Password" required>
                      <a href="javascript:;" class="input-group-text bg-transparent"><i class="bi bi-eye-slash-fill"></i></a>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-check form-switch">
                      <input class="form-check-input" type="checkbox" id="remember_me" name="remember_me">
                      <label class="form-check-label" for="remember_me">Remember Me</label>
                    </div>
                  </div>
                  <div class="col-12">
                    <div class="d-grid">
                      <button type="submit" class="btn btn-grd-primary">Login</button>
                    </div>
                  </div>
                </form>
              </div>

            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!--plugins-->
  <script src="/static/assets/js/jquery.min.js"></script>
  <script src="/static/assets/js/bootstrap.bundle.min.js"></script>

  <script>
    $(document).ready(function () {
      $("#show_hide_password a").on('click', function (event) {
        event.preventDefault();
        if ($('#show_hide_password input').attr("type") == "text") {
          $('#show_hide_password input').attr('type', 'password');
          $('#show_hide_password i').addClass("bi-eye-slash-fill");
          $('#show_hide_password i').removeClass("bi-eye-fill");
        } else if ($('#show_hide_password input').attr("type") == "password") {
          $('#show_hide_password input').attr('type', 'text');
          $('#show_hide_password i').removeClass("bi-eye-slash-fill");
          $('#show_hide_password i').addClass("bi-eye-fill");
        }
      });
    });
  </script>

</body>

</html>

<!doctype html>
<html lang="en" data-bs-theme="blue-theme">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change Password — Etsy Agent Manager</title>
  <!--favicon-->
  <link rel="icon" href="/static/assets/images/favicon-32x32.png" type="image/png">
  <!--loader-->
  <link href="/static/assets/css/pace.min.css" rel="stylesheet">
  <script src="/static/assets/js/pace.min.js"></script>

  <!--plugins-->
  <link href="/static/assets/plugins/perfect-scrollbar/css/perfect-scrollbar.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="/static/assets/plugins/metismenu/metisMenu.min.css">
  <link rel="stylesheet" type="text/css" href="/static/assets/plugins/metismenu/mm-vertical.css">
  <!--bootstrap css-->
  <link href="/static/assets/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet">
  <!--main css-->
  <link href="/static/assets/css/bootstrap-extended.css" rel="stylesheet">
  <link href="/static/assets/sass/main.css" rel="stylesheet">
  <link href="/static/assets/sass/dark-theme.css" rel="stylesheet">
  <link href="/static/assets/sass/blue-theme.css" rel="stylesheet">
  <link href="/static/assets/sass/responsive.css" rel="stylesheet">
</head>

<body>

  <!--authentication-->
  <div class="section-authentication-cover">
    <div class="">
      <div class="row g-0">

        <div class="col-12 col-xl-7 col-xxl-8 auth-cover-left align-items-center justify-content-center d-none d-xl-flex border-end bg-transparent">
          <div class="card rounded-0 mb-0 border-0 shadow-none bg-transparent bg-none">
            <div class="card-body">
              <img src="/static/assets/images/auth/forgot-password1.png" class="img-fluid auth-img-cover-login" width="550" alt="">
            </div>
          </div>
        </div>

        <div class="col-12 col-xl-5 col-xxl-4 auth-cover-right align-items-center justify-content-center">
          <div class="card rounded-0 m-3 mb-0 border-0 shadow-none bg-none">
            <div class="card-body p-5">
              <h4 class="fw-bold">Change Password</h4>
              <p class="mb-0">Enter your current password and choose a new one.</p>

              {% if error %}
              <div class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
                {{ error }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
              {% endif %}

              {% if success %}
              <div class="alert alert-success alert-dismissible fade show mt-3" role="alert">
                {{ success }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
              {% endif %}

              <div class="form-body mt-4">
                <form method="post" action="/change-password" class="row g-3">
                  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                  <div class="col-12">
                    <label class="form-label" for="current_password">Current Password</label>
                    <input type="password" class="form-control" id="current_password" name="current_password" placeholder="Enter current password" required>
                  </div>
                  <div class="col-12">
                    <label class="form-label" for="new_password">New Password</label>
                    <input type="password" class="form-control" id="new_password" name="new_password" placeholder="Enter new password" required minlength="8">
                  </div>
                  <div class="col-12">
                    <label class="form-label" for="confirm_password">Confirm New Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required minlength="8">
                  </div>
                  <div class="col-12">
                    <div class="d-grid gap-2">
                      <button type="submit" class="btn btn-grd-branding">Change Password</button>
                      <a href="/" class="btn btn-grd-royal">Back to Dashboard</a>
                    </div>
                  </div>
                </form>
              </div>

            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="/static/assets/js/jquery.min.js"></script>
  <script src="/static/assets/js/bootstrap.bundle.min.js"></script>

</body>

</html>

<!doctype html>
<html lang="en" data-bs-theme="blue-theme">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Etsy Agent Manager{% endblock %}</title>

  <!-- Loader -->
  <link href="/static/assets/css/pace.min.css" rel="stylesheet">
  <script src="/static/assets/js/pace.min.js"></script>

  <!-- Plugins CSS -->
  <link href="/static/assets/plugins/perfect-scrollbar/css/perfect-scrollbar.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/assets/plugins/metismenu/metisMenu.min.css">
  <link rel="stylesheet" href="/static/assets/plugins/metismenu/mm-vertical.css">
  <link rel="stylesheet" href="/static/assets/plugins/simplebar/css/simplebar.css">

  <!-- Bootstrap + Extended -->
  <link href="/static/assets/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/assets/css/bootstrap-extended.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet">

  <!-- Maxton Theme CSS (from sass/) -->
  <link href="/static/assets/sass/main.css" rel="stylesheet">
  <link href="/static/assets/sass/dark-theme.css" rel="stylesheet">
  <link href="/static/assets/sass/blue-theme.css" rel="stylesheet">
  <link href="/static/assets/sass/semi-dark.css" rel="stylesheet">
  <link href="/static/assets/sass/bordered-theme.css" rel="stylesheet">
  <link href="/static/assets/sass/responsive.css" rel="stylesheet">

  {% block head %}{% endblock %}
</head>

<body>

  {% include 'partials/sidebar.html' %}

  <main class="main-wrapper">
    <div class="main-content">

      {% include 'partials/topbar.html' %}

      {% block content %}{% endblock %}

      <footer class="page-footer">
        <p class="mb-0">© 2026 Etsy Agent Manager · Islamic Digital Products</p>
      </footer>

    </div>
  </main>

  <div class="overlay btn-toggle"></div>

<!-- Maxton JS -->
<script src="/static/assets/js/bootstrap.bundle.min.js"></script>
<script src="/static/assets/js/jquery.min.js"></script>
<script src="/static/assets/plugins/perfect-scrollbar/js/perfect-scrollbar.js"></script>
<script src="/static/assets/plugins/metismenu/metisMenu.min.js"></script>
<script src="/static/assets/plugins/simplebar/js/simplebar.min.js"></script>
<script src="/static/assets/js/main.js"></script>

<!-- Status polling -->
<script>
  function updateAgentStatuses() {
    fetch('/api/agents/status')
      .then(r => r.json())
      .then(data => {
        const agents = data.agents || {};
        document.querySelectorAll('.agent-status-badge').forEach(el => {
          const type = el.dataset.agent;
          if (agents[type]) {
            const status = agents[type].status;
            el.className = 'badge me-1 agent-status-badge';
            if (status === 'running') {
              el.classList.add('bg-success');
            } else if (status === 'failed') {
              el.classList.add('bg-danger');
            } else if (status === 'success') {
              el.classList.add('bg-secondary');
            } else {
              el.classList.add('bg-secondary');
            }
          }
        });

        const badge = document.getElementById('queue-count-badge');
        if (badge) badge.textContent = data.pending_reviews || 0;

        const sidebarBadge = document.getElementById('review-badge');
        if (sidebarBadge) sidebarBadge.textContent = data.pending_reviews || '';
      })
      .catch(() => {});
  }

  updateAgentStatuses();
  setInterval(updateAgentStatuses, 10000);
</script>

{% block scripts %}{% endblock %}

</body>
</html>

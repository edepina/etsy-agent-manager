networks:
  etsy-net:
    name: etsy-agent-manager_net

services:
  app:
    build: .
    expose:
      - "8000"
    networks:
      - etsy-net
    env_file: .env
    volumes:
      - ./static:/app/static
      - ./products:/app/products
      - ./app:/app/app
      - ./data:/app/data
      - ./tests:/app/tests
      - ./alembic:/app/alembic
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=info
    networks:
      - etsy-net
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./products:/app/products
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  beat:
    build: .
    command: celery -A app.tasks.celery_app beat --loglevel=info
    networks:
      - etsy-net
    env_file: .env
    volumes:
      - ./app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    networks:
      - etsy-net
    environment:
      POSTGRES_DB: etsy_agents
      POSTGRES_USER: edson
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edson -d etsy_agents"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - etsy-net
    restart: unless-stopped

volumes:
  pgdata:

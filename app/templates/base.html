<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Etsy Agent Manager{% endblock %}</title>

  <!-- Maxton CSS -->
  <link rel="stylesheet" href="/static/assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/assets/css/bootstrap-extended.css">
  <link rel="stylesheet" href="/static/assets/css/main.css">
  <link rel="stylesheet" href="/static/assets/css/dark-theme.css">
  <link rel="stylesheet" href="/static/assets/css/semi-dark.css">
  <link rel="stylesheet" href="/static/assets/css/bordered-theme.css">
  <link rel="stylesheet" href="/static/assets/css/responsive.css">

  <!-- Plugins -->
  <link rel="stylesheet" href="/static/assets/plugins/metismenu/metisMenu.min.css">
  <link rel="stylesheet" href="/static/assets/plugins/simplebar/css/simplebar.css">
  <link rel="stylesheet" href="/static/assets/plugins/perfect-scrollbar/css/perfect-scrollbar.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  {% block head %}{% endblock %}
</head>

<body class="semi-dark">

<div class="wrapper">

  <!-- Sidebar -->
  <aside class="sidebar-wrapper">
    {% include 'partials/sidebar.html' %}
  </aside>

  <!-- Main Content -->
  <main class="main-wrapper">

    {% include 'partials/topbar.html' %}

    <div class="page-content">
      {% block content %}{% endblock %}
    </div>

    <footer class="page-footer">
      <p class="mb-0">© 2024 Etsy Agent Manager · Islamic Digital Products</p>
    </footer>

  </main>

</div>

<!-- Maxton JS -->
<script src="/static/assets/js/bootstrap.bundle.min.js"></script>
<script src="/static/assets/plugins/metismenu/metisMenu.min.js"></script>
<script src="/static/assets/plugins/metismenu/metisMenu-init.js"></script>
<script src="/static/assets/plugins/simplebar/js/simplebar.min.js"></script>
<script src="/static/assets/js/main.js"></script>

<!-- Status polling -->
<script>
  function updateAgentStatuses() {
    fetch('/api/agents/status')
      .then(r => r.json())
      .then(data => {
        const agents = data.agents || {};
        document.querySelectorAll('.agent-status-badge').forEach(el => {
          const type = el.dataset.agent;
          if (agents[type]) {
            const status = agents[type].status;
            el.className = 'badge me-1 agent-status-badge';
            if (status === 'running') {
              el.classList.add('bg-success');
            } else if (status === 'failed') {
              el.classList.add('bg-danger');
            } else if (status === 'success') {
              el.classList.add('bg-secondary');
            } else {
              el.classList.add('bg-secondary');
            }
          }
        });

        const badge = document.getElementById('queue-count-badge');
        if (badge) badge.textContent = data.pending_reviews || 0;

        const sidebarBadge = document.getElementById('review-badge');
        if (sidebarBadge) sidebarBadge.textContent = data.pending_reviews || '';
      })
      .catch(() => {});
  }

  updateAgentStatuses();
  setInterval(updateAgentStatuses, 10000);
</script>

{% block scripts %}{% endblock %}

</body>
</html>
